# : Manager [[[

[mgr]
cwd = { fg = "#dee3e6" }

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#7e7aff", bg = "#7e7aff" }
marker_cut = { fg = "#e1e0ff", bg = "#e1e0ff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#c3c3eb", bg = "#c3c3eb" }

# Count
count_copied = { fg = "#171837", bg = "#e1e0ff" }
count_cut = { fg = "#171837", bg = "#e1e0ff" }
count_selected = { fg = "#003543", bg = "#c3c3eb" }

# Border
border_symbol = "в”Ӯ"
border_style = { fg = "#88d1ec" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "в–Ҳ", close = "в–Ҳ" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#88d1ec", bold = true, bg = "#0f1416" }
inactive = { fg = "#b3cad4", bg = "#0f1416" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#88d1ec", fg = "#003543", bold = true }
normal_alt = { bg = "#40484c", fg = "#bfc8cc" }

# Select mode
select_main = { bg = "#b3cad4", fg = "#1e333b", bold = true }
select_alt = { bg = "#40484c", fg = "#bfc8cc" }

# Unset mode
unset_main = { bg = "#c3c3eb", fg = "#2c2e4d", bold = true }
unset_alt = { bg = "#40484c", fg = "#bfc8cc" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "рҹӯҒ", close = "рҹӯ " }
sep_right = { open = "рҹӯҒ", close = "рҹӯ " }

# Permissions
perm_type = { fg = "#568498" }
perm_write = { fg = "#5050c5" }
perm_read = { fg = "#ff2b12" }
perm_exec = { fg = "#4d47ff" }
perm_sep = { fg = "#1ebdff" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#88d1ec", bg = "#353a3c" }
progress_error = { fg = "#ffb4ab", bg = "#353a3c" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#353a3c" }
cand = { fg = "#88d1ec" }
rest = { fg = "#003543" }
desc = { fg = "#dee3e6" }
separator = " в–¶ "
separator_style = { fg = "#dee3e6" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#c3c3eb" }
title_warn = { fg = "#88d1ec" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#88d1ec" }
active = { fg = "#c3c3eb", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#88d1ec" }
value = { fg = "#dee3e6" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#88d1ec", bg = "#003543" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#88d1ec" }
title = {}
hovered = { fg = "#e1e0ff", underline = true }

# : ]]]


# : Help [[[

[help]
on = { fg = "#dee3e6" }
run = { fg = "#dee3e6" }
footer = { fg = "#1e333b", bg = "#b3cad4" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", mime = "*", is = "orphan", bg = "#93000a" },
    { name = "*", mime = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dee3e6" },
    { url = "*/", fg = "#88d1ec" },
]

# : ]]]

