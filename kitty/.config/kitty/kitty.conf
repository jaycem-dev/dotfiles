font_family JetBrains Mono
font_size 12
cursor_trail 1
tab_bar_edge top
background_opacity 0.9
background_blur 1

action_alias launch_window launch --cwd current --type os-window
action_alias launch_overlay launch --cwd current --type overlay

map kitty_mod+n launch_window
map kitty_mod+g launch_window lazygit
map kitty_mod+a launch_window opencode

include themes/Colors.conf
