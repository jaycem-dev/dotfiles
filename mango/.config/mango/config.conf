# More option see https://github.com/DreamMaoMao/mango/wiki/
source=./colors.conf

exec-once=waybar -c ~/.config/waybar/mango.jsonc
exec-once=hypridle -c ~/.config/mango/hypridle.conf
# asahi nixos workaraound for display brightness bug
exec-once=mmsg dispatch disable_monitor,; mmsg dispatch enable_monitor,

monitorrule=name:^eDP-1$,scale:1.7
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:72

circle_layout=tile,scroller

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 10
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.9

cursor_size=24
cursor_theme=Bibata-Modern-Classic

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.9
zoom_end_ratio=0.9
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=400
animation_duration_open=400
animation_duration_tag=400
animation_duration_close=400
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=0
scroller_default_proportion=0.9
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.6,0.9

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_variant=colemak_dh_iso
xkb_rules_options=caps:escape

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=0
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
click_method=2

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
binds=super+shift,r,reload_config

binds=alt+shift,s,spawn_shell,grim $HOME/Pictures/Screenshots/$(date +%Y%m%d%H%M%S).png
binds=super+shift,s,spawn_shell,g=$(slurp -d) && [ -n "$g" ] && grim -g "$g" $HOME/Pictures/Screenshots/$(date +%Y%m%d%H%M%S).png

# menu and terminal
binds=super,space,spawn,fuzzel
binds=super,t,spawn,kitty -1

# apps
binds=super,b,spawn,~/.local/bin/mango-launch-or-focus brave --id brave-browser
binds=super,n,spawn,~/.local/bin/mango-launch-or-focus --tui nvim-projects
binds=super,m,spawn,~/.local/bin/mango-launch-or-focus --webapp open.spotify.com
binds=super,e,spawn,~/.local/bin/mango-launch-or-focus --tui yazi
binds=super,w,spawn,~/.local/bin/mango-launch-or-focus --webapp web.whatsapp.com
binds=super,y,spawn,~/.local/bin/mango-launch-or-focus --webapp youtube.com
binds=super+shift,m,spawn,~/.local/bin/mango-launch-or-focus --webapp mail.proton.me
binds=super,p,spawn,~/.local/bin/dmenu-power

# exit
binds=SUPER+shift,q,quit
binds=super,q,killclient,

# switch window focus
bind=alt,Tab,focusstack,next
bind=super,Left,focusdir,left
bind=super,Right,focusdir,right
bind=super,Up,focusdir,up
bind=super,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
binds=SUPER,g,toggleglobal,
binds=super,tab,toggleoverview,
binds=super,v,togglefloating,
binds=super+shift,f,togglefullscreen,
binds=super,f,togglemaximizescreen,
binds=SUPER,i,minimized,
binds=SUPER,o,toggleoverlay,
binds=SUPER+SHIFT,I,restore_minimized
binds=super,z,toggle_scratchpad

# scroller layout
binds=super,a,set_proportion,1.0
binds=super,r,switch_proportion_preset,

# switch layout
binds=SUPER,l,switch_layout

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=super,1,view,1,0
bind=super,2,view,2,0
bind=super,3,view,3,0
bind=super,4,view,4,0
bind=super,5,view,5,0
bind=super,6,view,6,0
bind=super,7,view,7,0
bind=super,8,view,8,0
bind=super,9,view,9,0

bind=super+ctrl,1,toggleview,1,0
bind=super+ctrl,2,toggleview,2,0
bind=super+ctrl,3,toggleview,3,0
bind=super+ctrl,4,toggleview,4,0
bind=super+ctrl,5,toggleview,5,0
bind=super+ctrl,6,toggleview,6,0
bind=super+ctrl,7,toggleview,7,0
bind=super+ctrl,8,toggleview,8,0
bind=super+ctrl,9,toggleview,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=super+shift,1,tag,1,0
bind=super+shift,2,tag,2,0
bind=super+shift,3,tag,3,0
bind=super+shift,4,tag,4,0
bind=super+shift,5,tag,5,0
bind=super+shift,6,tag,6,0
bind=super+shift,7,tag,7,0
bind=super+shift,8,tag,8,0
bind=super+shift,9,tag,9,0

# monitor switch
# bind=alt+shift,Left,focusmon,left
# bind=alt+shift,Right,focusmon,right
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right

# gaps
binds=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

bindl=NONE,XF86MonBrightnessUp,spawn,~/.local/bin/brightness up
bindl=SHIFT,XF86MonBrightnessUp,spawn,~/.local/bin/brightness up 50
bindl=NONE,XF86MonBrightnessDown,spawn,~/.local/bin/brightness down
bindl=SHIFT,XF86MonBrightnessDown,spawn,~/.local/bin/brightness down 50
bindl=NONE,XF86AudioRaiseVolume,spawn,~/.local/bin/volume up
bindl=SHIFT,XF86AudioRaiseVolume,spawn,~/.local/bin/volume up 50
bindl=NONE,XF86AudioLowerVolume,spawn,~/.local/bin/volume down
bindl=SHIFT,XF86AudioLowerVolume,spawn,~/.local/bin/volume down 50
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bindl=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPrev,spawn,playerctl previous
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=super,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# 3-finger: Window focus
# gesturebind=none,right,3,focusdir,left
# gesturebind=none,left,3,focusdir,right
# gesturebind=none,up,3,focusdir,up
# gesturebind=none,down,3,focusdir,down
# 4-finger: Workspace navigation
gesturebind=none,right,3,viewtoleft_have_client
gesturebind=none,left,3,viewtoright_have_client
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview

# layer rule
layerrule=animation_type_open:zoom,layer_name:launcher
layerrule=animation_type_close:zoom,layer_name:launcher
layerrule=noblur:1,layer_name:selection

# window rules
windowrule=appid:brave-browser,tags:1
windowrule=appid:nvim-projects,tags:2
windowrule=appid:kitty,tags:2
windowrule=appid:foot,tags:2
windowrule=appid:brave-open.spotify.com__-Default,tags:3
windowrule=appid:brave-web.whatsapp.com__-Default,tags:4
windowrule=appid:brave-mail.proton.me__-Default,tags:4
windowrule=appid:steam,tags:5
windowrule=appid:heroic,tags:5

windowrule=title:Picture in picture,isfloating:1,isglobal:1,isoverlay:1,width:384,height:216,offsetx:100,offsety:-100
